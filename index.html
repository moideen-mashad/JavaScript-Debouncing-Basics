<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Debouncing | Performance Basics</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>

<body class="bg-[#F8F9FA] text-[#0D0907] min-h-screen flex flex-col items-center py-16 px-6">
    <div class="max-w-[550px] w-full">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight mb-2">JS Debouncing</h1>
            <p class="text-gray-500 font-medium tracking-tight">Performance Optimization Technique</p>
        </header>

        <!-- Main Demo Area -->
        <main
            class="bg-white p-8 sm:p-10 rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.03)] border border-black/5 mb-12">
            <input type="text" id="search" placeholder="Type something quickly..."
                class="w-full p-4 text-lg border-2 border-gray-100 rounded-xl bg-[#F8F9FA] transition-all outline-none focus:border-[#1A2E44] focus:bg-white placeholder:text-gray-400">

            <!-- Results Grid -->
            <div class="grid grid-cols-2 gap-4 mt-8">
                <div class="p-5 bg-[#F8F9FA] rounded-xl border border-black/[0.03]">
                    <span
                        class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Immediate</span>
                    <div id="normal-text" class="font-extrabold break-all min-h-[1.5rem] text-gray-800">---</div>
                </div>
                <div class="p-5 bg-white rounded-xl border-2 border-[#1A2E44] shadow-sm">
                    <span
                        class="block text-[10px] font-bold text-[#1A2E44] uppercase tracking-widest mb-2">Debounced</span>
                    <div id="debounced-text" class="font-extrabold break-all min-h-[1.5rem] text-[#1A2E44]">---</div>
                </div>
            </div>
        </main>


    </div>

    <!-- Logic -->
    <script src="script.js"></script>
</body>

</html>
